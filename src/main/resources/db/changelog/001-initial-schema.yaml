databaseChangeLog:
  - changeSet:
      id: 001-initial-schema
      author: imin
      changes:
        - createTable:
            tableName: generated_event
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vibe
                  type: TEXT
              - column:
                  name: tone
                  type: VARCHAR(255)
              - column:
                  name: genre
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(255)
              - column:
                  name: event_date
                  type: DATE
              - column:
                  name: platforms
                  type: TEXT
              - column:
                  name: accent_colors
                  type: TEXT
              - column:
                  name: poster_urls
                  type: TEXT
              - column:
                  name: suggested_min_price
                  type: NUMERIC(10,2)
              - column:
                  name: suggested_max_price
                  type: NUMERIC(10,2)
              - column:
                  name: recommended_dow
                  type: VARCHAR(20)
              - column:
                  name: pricing_notes
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: concept
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: generated_event_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_concept_event
                    references: generated_event(id)
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: tagline
                  type: VARCHAR(255)
              - column:
                  name: sort_order
                  type: INTEGER

        - createTable:
            tableName: social_copy
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: generated_event_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_social_copy_event
                    references: generated_event(id)
              - column:
                  name: platform
                  type: VARCHAR(50)
              - column:
                  name: copy_text
                  type: TEXT
