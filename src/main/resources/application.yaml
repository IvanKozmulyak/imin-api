spring:
  application:
    name: imin-api
  profiles:
    default: dev
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      image:
        options:
          model: dall-e-3
          size: 1024x1024

openrouter:
  api-key: ${OPENROUTER_API_KEY}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
  model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}
