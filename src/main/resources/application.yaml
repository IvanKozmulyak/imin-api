logging:
  level:
    com.imin.iminapi.service.poster: DEBUG

spring:
  application:
    name: imin-api
  profiles:
    default: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB

replicate:
  api-token: ${REPLICATE_API_TOKEN:}
  image:
    storage-dir: ${REPLICATE_IMAGE_STORAGE_DIR:./generated-images}
  models:
    ideogram-turbo: ${IDEOGRAM_TURBO_MODEL:ideogram-ai/ideogram-v3-turbo}
    ideogram-quality: ${IDEOGRAM_QUALITY_MODEL:ideogram-ai/ideogram-v3-quality}
  timeout-seconds: 65
  max-concurrent: 6

poster:
  references:
    config-file: classpath:poster-references.yaml
  overlay:
    qr-size-px: 120
    address-max-chars: 80
  generation:
    variant-count: 3
    retry-on-validation-failure: 1

openrouter:
  api-key: ${OPENROUTER_API_KEY}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
  model: ${OPENROUTER_MODEL:openai/gpt-4o-mini}

openai:
  image:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    model: ${OPENAI_IMAGE_MODEL:gpt-image-1}

imin:
  reference-analyzer:
    model-id: ${IMIN_REFERENCE_ANALYZER_MODEL:openai/gpt-4o-mini}
  api:
    base-path: /api/v1
  auth:
    session-ttl-days: 30
  ratelimit:
    login:
      capacity: 5
      window-minutes: 15
    ai-concept:
      capacity: 10
      window-minutes: 60
  media:
    enabled: ${MEDIA_ENABLED:true}
    bucket: ${R2_BUCKET:imin-media-dev}
    endpoint: ${R2_ENDPOINT:https://example.r2.cloudflarestorage.com}
    region: ${R2_REGION:auto}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    public-url-prefix: ${R2_PUBLIC_URL_PREFIX:https://media-dev.imin.example/}

