spring:
  profiles:
    active: test
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:imin;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  ai:
    openai:
      api-key: test

openrouter:
  api-key: test
  base-url: https://openrouter.ai/api/v1
  model: openai/gpt-4o

replicate:
  api-token: test-token
  model: ideogram-ai/ideogram-v3-turbo
  image:
    storage-dir: /tmp/imin-test-images

imin:
  reference-analyzer:
    model-id: openai/gpt-4o-mini
  api:
    base-path: /api/v1
  auth:
    session-ttl-days: 30
  ratelimit:
    login:
      capacity: 5
      window-minutes: 15
    ai-concept:
      capacity: 10
      window-minutes: 60
