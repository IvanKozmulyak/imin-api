spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:imin;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true
  ai:
    openai:
      api-key: test

openrouter:
  api-key: test
  base-url: https://openrouter.ai/api/v1
  model: openai/gpt-4o
